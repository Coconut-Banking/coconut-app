<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coconut - Connect Phone</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 2rem; max-width: 400px; margin: 0 auto; text-align: center; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .url { background: #f5f5f5; padding: 1rem; border-radius: 12px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin-bottom: 1.5rem; }
    img { display: block; margin: 0 auto 1rem; border-radius: 8px; }
    .steps { text-align: left; background: #f9f9f9; padding: 1.25rem; border-radius: 12px; font-size: 0.9rem; }
    .steps ol { margin: 0; padding-left: 1.25rem; }
    .steps li { margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <h1>Connect Your Phone</h1>
  <p>Make sure Expo is running and your phone is on the same Wi‑Fi as this Mac.</p>
  <div class="url" id="url">exp://192.168.1.10:8081</div>
  <img id="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=exp://192.168.1.10:8081" alt="QR Code" width="280" height="280">
  <div class="steps">
    <strong>Steps:</strong>
    <ol>
      <li>Open <strong>Expo Go</strong> on your iPhone</li>
      <li>Tap &quot;Enter URL manually&quot; (or scan the QR above with your camera)</li>
      <li>Paste or type: <code>exp://192.168.1.10:8081</code></li>
    </ol>
  </div>
</body>
</html>
